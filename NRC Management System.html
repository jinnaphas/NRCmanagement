      <select id="coi-fdir" class="form-control" style="width:180px" onchange="renderConflict()"><option value="">— กรรมการทั้งหมด —</option>${dirOpts}</select>
      <select id="coi-fmtg" class="form-control" style="width:160px" onchange="renderConflict()"><option value="">— ทุกการประชุม —</option>${mtgOpts}</select>
      <span style="margin-left:auto;font-size:12px;color:var(--text-light)">${rows.length} รายการ</span>
    </div>
    <div class="panel"><div class="panel-body" style="padding:0">
      <table class="tbl">
        <thead><tr><th>วันที่</th><th>กรรมการ</th><th>การประชุม</th><th>วาระ</th><th>แจ้ง COI</th><th>งดออกเสียง</th><th>หมายเหตุ</th><th></th></tr></thead>
        <tbody>${tRows||'<tr><td colspan="8" class="text-muted" style="text-align:center;padding:30px">ยังไม่มีบันทึก COI</td></tr>'}</tbody>

function saveConflict(id) {
  const dirId = document.getElementById('coi-dir').value;

  if (!dirId || !agenda || !dateVal) { alert('กรุณากรอกข้อมูลให้ครบ'); return; }
  const d = DB.directors.find(x=>x.id===dirId);
  const entry = {
    id:id||genId('coi'), directorId:dirId, directorName:d?d.name:'',
    meetingId:document.getElementById('coi-mtg').value,
    meetingRef:document.getElementById('coi-ref').value,
    agenda, date:toBEStr(dateVal),
    declared:document.getElementById('coi-declared').value==='1',
    abstained:document.getElementById('coi-abstained').value==='1',
    note:document.getElementById('coi-note').value

}

      </div>`).join('');

  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="sync-highlight">
      <strong>การเปลี่ยนแปลง:</strong> ${changeType} — ${dirName}<br>
      <span style="font-size:12px">แก้ไขรายชื่อในแต่ละคณะย่อยให้ตรงกับสถานะปัจจุบัน</span>

function addSCMember(si) {
  const wrap = document.getElementById('sc-members-'+si);
  const mi = wrap.children.length;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0';
  div.innerHTML = `<input type="text" class="form-control" style="flex:1;font-size:12px" id="sc-${si}-n${mi}" placeholder="ชื่อกรรมการ"><input type="text" class="form-control" style="width:100px;font-size:12px" id="sc-${si}-r${mi}" placeholder="บทบาท"><button class="btn btn-sm" style="color:var(--red);background:none;border:none;font-size:16px;padding:0 4px" onclick="this.parentElement.remove()">✕</button>`;
  wrap.appendChild(div);
}

function removeSCMember(si, mi) {
  const el = document.getElementById('sc-'+si+'-n'+mi)?.parentElement;
  if (el) el.remove();
}

function saveCommitteeSync() {
  DB.board.subcommittees.forEach((sc, si) => {
    const wrap = document.getElementById('sc-members-'+si);
    if (!wrap) return;
    const newMembers = [];
    wrap.querySelectorAll('[id^="sc-'+si+'-n"]').forEach((inp, idx) => {
      const name = inp.value.trim();
      const roleEl = document.getElementById('sc-'+si+'-r'+idx);
      const role = roleEl ? roleEl.value.trim() : '';
      if (name) newMembers.push({ name, role, type:'independent', term:'' });
    });
    sc.members = newMembers;
  });
  saveData();
  closeModal();
  alert('✅ อัพเดทรายชื่อคณะย่อยเรียบร้อยแล้ว');
}

function saveCompanySettings() {
  DB.company.name=document.getElementById('set-name').value;
  DB.company.abbr=document.getElementById('set-abbr').value;
  DB.company.fiscalYear=parseInt(document.getElementById('set-year').value);
  DB.company.secretary=document.getElementById('set-sec').value;
  saveData(); alert('บันทึกเรียบร้อยแล้ว');
}

function exportData() {
  const json=JSON.stringify(DB,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`NRC_PCC_Data_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importData(input) {
  const file=input.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=function(e) {
    try {
      const imported=JSON.parse(e.target.result);
      if (confirm('นำเข้าข้อมูลจะแทนที่ข้อมูลปัจจุบันทั้งหมด ยืนยัน?')) {
        DB=imported; saveData(); alert('นำเข้าสำเร็จ'); renderSettings();
      }
    } catch(err) { alert('ไฟล์ JSON ไม่ถูกต้อง: '+err.message); }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm('ยืนยันการล้างข้อมูลทั้งหมด?')) return;
  if (!confirm('ยืนยันอีกครั้ง — ข้อมูลทั้งหมดจะถูกลบถาวร')) return;
  DB=JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData();
  alert('ล้างข้อมูลเรียบร้อยแล้ว'); showSection('dashboard');
}

      statusEl.innerHTML = '<span style="color:var(--green)">&#10003; Connected</span> &mdash; Gist ID: <code style="font-size:11px">' + gistId + '</code>';
    } else {
      statusEl.innerHTML = '<span style="color:var(--muted)">&#128394; ยังไม่ได้ connect — ใส่ Token แล้วกด Connect</span>';
    }
  }
}
async function connectGist() {
  const token = (document.getElementById('gist-token').value||'').trim();
  if (!token) { alert('กรุณาใส่ GitHub Personal Access Token'); return; }
  const statusEl = document.getElementById('gist-panel-status');
  statusEl.innerHTML = '&#9203; กำลัง connect...';
  let gistId = (document.getElementById('gist-id').value||'').trim();
  try {
    if (!gistId) {
      statusEl.innerHTML = '&#9203; กำลังสร้าง Private Gist ใหม่...';
      gistId = await createNewGist(token, DB);
      document.getElementById('gist-id').value = gistId;
    } else {
      statusEl.innerHTML = '&#9203; กำลังตรวจสอบ Gist...';
      await fetchFromGist(token, gistId);
    }
    localStorage.setItem(GIST_SETTINGS_KEY, JSON.stringify({ token, gistId }));
    updateSyncStatus('syncing', 'กำลัง upload...');
    statusEl.innerHTML = '&#9203; กำลัง upload ข้อมูลปัจจุบัน...';
    await pushToGist(token, gistId, DB);
    const t = new Date().toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    updateSyncStatus('ok', 'Sync ' + t);
    statusEl.innerHTML = '<span style="color:var(--green)">&#10003; Connected!</span><br>Gist ID: <code style="font-size:11px">' + gistId + '</code><br><small class="text-muted">ข้อมูลปัจจุบัน sync แล้ว ' + t + '</small>';
  } catch(e) {
    statusEl.innerHTML = '<span style="color:var(--red)">&#10007; Error: ' + e.message + '</span>';
    updateSyncStatus('error', 'Connect ไม่สำเร็จ');
  }
}
async function syncNow() {
  const { token, gistId } = getGistSettings();
  if (!token || !gistId) { alert('ยังไม่ได้ connect Gist\nกรุณาไปที่ตั้งค่า > GitHub Gist Sync'); return; }
  const statusEl = document.getElementById('gist-panel-status');
  updateSyncStatus('syncing', 'กำลัง sync...');
  if (statusEl) statusEl.innerHTML = '&#9203; กำลัง sync...';
  try {
    await pushToGist(token, gistId, DB);
    const t = new Date().toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    updateSyncStatus('ok', 'Sync ' + t);
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)">&#10003; Sync สำเร็จ ' + t + '</span><br>Gist ID: <code style="font-size:11px">' + gistId + '</code>';
  } catch(e) {
    updateSyncStatus('error', 'Sync ไม่สำเร็จ');
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">&#10007; ' + e.message + '</span>';
  }
}
function disconnectGist() {
  if (!confirm('ยืนยันการ Disconnect Gist?\nข้อมูลใน localStorage จะยังคงอยู่')) return;
  localStorage.removeItem(GIST_SETTINGS_KEY);
  const tokenEl = document.getElementById('gist-token');
  const idEl = document.getElementById('gist-id');
  const statusEl = document.getElementById('gist-panel-status');
  if (tokenEl) tokenEl.value = '';
  if (idEl) idEl.value = '';
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--muted)">&#128394; Disconnected — ข้อมูลยังอยู่ใน localStorage</span>';
  updateSyncStatus('idle', 'ไม่ได้ connect');
}
// ─────────────────────────────────────────────────────────────────────────────
function generateDisclosure() {
  const yr = parseInt(document.getElementById('dis-year').value)||DB.company.fiscalYear;
  const mtgs = DB.meetings.filter(m=>m.year===yr);
  const completed = mtgs.filter(m=>m.status==='completed').length;
  const total = mtgs.length;
  const cg = getDirectorCGStats();
  const stripPrefix = n => n.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'').trim();
  const indepList = DB.directors.filter(d=>d.type==='independent').map(d=>stripPrefix(d.name));
  const nrcMembers = DB.directors.filter(d=>d.nrcRole&&d.nrcRole!=='none').map(d=>{
    const role = d.nrcRole==='chair'?'ประธาน':'กรรมการ';
    return `${d.name} (${role})`;
  }).join(' / ');
  const trainYr = DB.directorTraining.filter(t=>t.date&&t.date.startsWith(String(yr)));
  const trainHrs = trainYr.reduce((a,b)=>a+(b.hours||0),0);
  const remunYr = DB.remuneration.filter(r=>r.year===yr);
  const totalRemun = remunYr.reduce((a,b)=>a+(b.retainer||0)+(b.boardFee||0)+(b.nrcFee||0)+(b.otherFee||0),0);
  const text = `คณะกรรมการสรรหาและพิจารณาค่าตอบแทน (NRC) ประกอบด้วย ${nrcMembers}

ในรอบปีบัญชี ${yr} คณะกรรมการ NRC มีการประชุมรวมทั้งสิ้น ${total} ครั้ง โดยสำเร็จแล้ว ${completed} ครั้ง

โครงสร้างคณะกรรมการบริษัท มีกรรมการรวม ${cg.total} คน แบ่งเป็น กรรมการอิสระ ${cg.independent} คน (${cg.indepRatio}%) กรรมการหญิง ${cg.female} คน (${cg.femaleRatio}%) และกรรมการที่ไม่เป็นผู้บริหาร ${cg.nonexec} คน (${cg.nonexecRatio}%)

กรรมการอิสระ ได้แก่ ${indepList.join(', ')}

${trainHrs>0?`ในปี ${yr} คณะกรรมการได้รับการพัฒนาความรู้และทักษะรวม ${trainHrs} ชั่วโมง`:''}
${totalRemun>0?`ค่าตอบแทนกรรมการรวมทั้งหมดในปี ${yr}: ${totalRemun.toLocaleString('th-TH')} บาท`:''}`;
  const out = document.getElementById('disclosure-output');
  if (out) out.innerHTML = `<div style="background:#f9f9f9;border:1px solid var(--border);border-radius:6px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap">${text}</div><button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById('disclosure-output').querySelector('div').textContent)">📋 คัดลอก</button>`;
}

document.addEventListener('DOMContentLoaded', async function() {
  loadData();
  showSection('dashboard');
  initDataFromGist(); // sync from Gist in background
});

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRC Management System — PCC</title>
<style>
:root {
  --navy: #1F3864; --blue: #2E75B6; --orange: #ED7D31; --green: #70AD47;
  --red: #C00000; --gold: #C9A227; --light-blue: #BDD7EE;
  --light-gray: #F5F5F5; --border: #D0D7E3; --text: #2C3E50; --text-light: #6C7A89;
  --sidebar-w: 220px; --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Sarabun","Segoe UI",sans-serif; background: var(--light-gray); color: var(--text); font-size: 14px; display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: var(--sidebar-w); background: var(--navy); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
#sidebar .logo { padding: 16px 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.15); }
#sidebar .logo h2 { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
#sidebar .logo p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
#sidebar nav { flex: 1; padding: 8px 0; }
#sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 11px 16px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13.5px; transition: background 0.15s,color 0.15s; cursor: pointer; border: none; background: none; width: 100%; }
#sidebar nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
#sidebar nav a.active { background: var(--blue); color: #fff; font-weight: 600; }
#sidebar nav a .icon { font-size: 16px; width: 20px; text-align: center; }
#sidebar .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.15); font-size: 11px; color: rgba(255,255,255,0.5); }
#main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { height: var(--header-h); background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 50; flex-shrink: 0; }
#topbar h1 { font-size: 18px; font-weight: 700; color: var(--navy); flex: 1; }
#topbar .badge { background: var(--navy); color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 12px; }
#sync-status { font-size: 11px; color: var(--muted); white-space: nowrap; transition: color .3s; cursor: default; }
#sync-status.syncing { color: var(--blue); }
#sync-status.ok { color: var(--green); }
#sync-status.error { color: var(--red); }
#sync-status.idle { color: var(--muted); }
#content { flex: 1; overflow-y: auto; padding: 20px 24px; }
.cards-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
.card { background: #fff; border-radius: 8px; border: 1px solid var(--border); padding: 16px 20px; flex: 1; min-width: 150px; }
.card .card-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.card .card-value { font-size: 28px; font-weight: 700; color: var(--navy); }
.card .card-sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.card.orange .card-value { color: var(--orange); } .card.green .card-value { color: var(--green); } .card.red .card-value { color: var(--red); } .card.blue .card-value { color: var(--blue); }
.panel { background: #fff; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
.panel-header { background: var(--navy); color: #fff; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.panel-header h3 { font-size: 14px; font-weight: 600; }
.panel-body { padding: 16px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { background: var(--navy); color: #fff; padding: 8px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
.tbl td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #f0f4fa; }
.tbl tr.clickable { cursor: pointer; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 5px; font-size: 13px; border: none; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--blue); color: #fff; } .btn-navy { background: var(--navy); color: #fff; } .btn-orange { background: var(--orange); color: #fff; } .btn-green { background: var(--green); color: #fff; } .btn-red { background: var(--red); color: #fff; } .btn-outline { background: #fff; color: var(--navy); border: 1px solid var(--border); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
/* Buttons on dark (navy) panel headers */
.btn-light { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.5); }
.btn-light:hover { background: rgba(255,255,255,0.28); opacity: 1; }
.btn-light-red { background: rgba(192,0,0,0.25); color: #ffaaaa; border: 1px solid rgba(255,100,100,0.5); }
.btn-light-red:hover { background: rgba(192,0,0,0.45); opacity: 1; }
.badge-status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.status-completed { background: #E2EFDA; color: #375623; } .status-planned { background: #DEEAF1; color: var(--blue); } .status-pending { background: #FFF2CC; color: #996633; } .status-overdue { background: #FCE4D6; color: var(--red); } .status-inprogress { background: #E2E8F8; color: var(--navy); } .status-done { background: #E2EFDA; color: #375623; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 5px; }
.form-control { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; font-family: inherit; background: #fff; color: var(--text); transition: border-color 0.15s; }
.form-control:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(46,117,182,0.15); }
textarea.form-control { resize: vertical; min-height: 80px; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; }
.form-row .form-group { flex: 1; min-width: 160px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 10px; width: 90%; max-width: 720px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { background: var(--navy); color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-radius: 10px 10px 0 0; position: sticky; top: 0; z-index: 1; }
.modal-header h3 { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; line-height: 1; }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; flex-wrap: wrap; }
.tab-btn { padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 13px; color: var(--text-light); border-bottom: 2px solid transparent; margin-bottom: -2px; font-family: inherit; transition: all 0.15s; }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tab-btn:hover { color: var(--navy); }
.skills-matrix { overflow-x: auto; }
.skills-matrix table { border-collapse: collapse; font-size: 11px; }
.skills-matrix th, .skills-matrix td { border: 1px solid var(--border); padding: 5px 8px; text-align: center; white-space: nowrap; }
.skills-matrix th { background: var(--navy); color: #fff; }
.skills-matrix .dir-name { text-align: left; font-weight: 600; background: #f0f4fa; min-width: 200px; }
.dir-avatar { width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0; }
.dir-avatar-sm { width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border);vertical-align:middle;margin-right:6px; }
.dir-avatar-placeholder { display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--navy);color:#fff;font-weight:700;flex-shrink:0; }
.dir-avatar-wrap { display:flex;align-items:center;gap:10px; }
#photo-preview-wrap { display:flex;align-items:center;gap:14px;margin-top:8px; }
#photo-preview-wrap img, #photo-preview-wrap .dir-avatar-placeholder { width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border);font-size:24px; }
.skill-cell { font-size: 16px; cursor: pointer; }
.skill-1 { color: var(--green); } .skill-0 { color: #ddd; }
.succession-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 14px; }
.succession-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.succession-card .sc-header { background: var(--navy); color: #fff; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.succession-card .sc-header h4 { font-size: 13px; font-weight: 700; }
.succession-card .sc-body { padding: 12px 14px; }
.succession-card .sc-successor { margin-bottom: 8px; }
.succession-card .sc-successor .label { font-size: 10px; color: var(--text-light); text-transform: uppercase; }
.succession-card .sc-successor .name { font-size: 13px; font-weight: 600; }
.readiness { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.ready-now { background: #E2EFDA; color: #375623; } .ready-1y { background: #DEEAF1; color: var(--blue); } .ready-2y { background: #FFF2CC; color: #996633; } .ready-not { background: #FCE4D6; color: var(--red); }
.section-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.text-muted { color: var(--text-light); font-size: 12px; }
.alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
.alert-info { background: #DEEAF1; color: var(--navy); border-left: 4px solid var(--blue); }
.alert-warn { background: #FFF2CC; color: #665500; border-left: 4px solid var(--gold); }
.alert-success { background: #E2EFDA; color: #375623; border-left: 4px solid var(--green); }
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--blue); transition: width 0.3s; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
.empty-state .emoji { font-size: 36px; margin-bottom: 10px; }
.float-right { float: right; }
.flex-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.flex-center { display: flex; align-items: center; gap: 8px; }
.mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mb-8 { margin-bottom: 8px; } .mb-0 { margin-bottom: 0; }
.tag { display: inline-block; background: var(--light-blue); color: var(--navy); padding: 2px 8px; border-radius: 10px; font-size: 11px; margin: 2px; }
/* ATTACHMENT STYLES */
.attach-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.attach-zone:hover { border-color: var(--blue); background: #f0f4fa; }
.attach-zone input[type=file] { display: none; }
.attach-list { margin-top: 10px; }
.attach-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #f8f9fa; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 6px; font-size: 12px; }
.attach-item .attach-icon { font-size: 18px; }
.attach-item .attach-name { flex: 1; color: var(--navy); font-weight: 500; word-break: break-all; }
.attach-item a { color: var(--blue); text-decoration: none; }
.attach-item a:hover { text-decoration: underline; }
.attach-item .btn-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 0 2px; }
.meeting-doc-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.meeting-doc-card { display: flex; align-items: center; gap: 8px; background: #f0f4fa; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; min-width: 160px; }
.meeting-doc-card .doc-icon { font-size: 20px; }
.meeting-doc-card .doc-info { flex: 1; }
.meeting-doc-card .doc-name { font-weight: 600; color: var(--navy); }
.meeting-doc-card .doc-size { color: var(--text-light); font-size: 10px; }
/* Director Changelog Timeline */
.changelog-timeline { position: relative; padding-left: 28px; }
.changelog-timeline::before { content:''; position:absolute; left:10px; top:0; bottom:0; width:2px; background:var(--border); }
.cl-entry { position:relative; margin-bottom:16px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
.cl-entry::before { content:''; position:absolute; left:-22px; top:18px; width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 2px var(--blue); background:var(--blue); }
.cl-entry.type-appointed::before { background:var(--green); box-shadow:0 0 0 2px var(--green); }
.cl-entry.type-resigned::before { background:var(--red); box-shadow:0 0 0 2px var(--red); }
.cl-entry.type-role_change::before { background:var(--orange); box-shadow:0 0 0 2px var(--orange); }
.cl-entry.type-committee_change::before { background:var(--gold); box-shadow:0 0 0 2px var(--gold); }
.cl-entry.type-position_change::before { background:var(--blue); box-shadow:0 0 0 2px var(--blue); }
.cl-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.cl-title { font-size:14px; font-weight:700; color:var(--navy); }
.cl-date { font-size:11px; color:var(--text-light); white-space:nowrap; }
.cl-detail { font-size:13px; color:var(--text); margin-bottom:6px; }
.cl-refs { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.cl-ref-tag { background:#f0f4fa; border:1px solid var(--border); border-radius:12px; padding:2px 10px; font-size:11px; color:var(--navy); }
.cl-ref-tag.nrc { background:#DEEAF1; border-color:var(--blue); color:var(--blue); }
.cl-ref-tag.board { background:#E2E8F8; border-color:var(--navy); color:var(--navy); }
.cl-ref-tag.agm { background:#FFF2CC; border-color:var(--gold); color:#665500; }
.cl-actions { display:flex; gap:6px; }
.cl-type-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; margin-bottom:6px; }
.cltype-appointed { background:#E2EFDA; color:#375623; }
.cltype-resigned { background:#FCE4D6; color:var(--red); }
.cltype-role_change { background:#FCE4D6; color:#7B2500; }
.cltype-committee_change { background:#FFF2CC; color:#665500; }
.cltype-position_change { background:#DEEAF1; color:var(--blue); }
.cltype-other { background:#F5F5F5; color:var(--text-light); }
/* ===== New modules CSS ===== */
.doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
.doc-card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px; }
.doc-card .doc-type-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-bottom:8px; }
.doc-type-charter { background:#DEEAF1; color:var(--blue); }
.doc-type-policy { background:#E2EFDA; color:#375623; }
.doc-type-procedure { background:#FFF2CC; color:#665500; }
.doc-type-form { background:#FCE4D6; color:var(--red); }
.doc-type-other { background:#F5F5F5; color:var(--text-light); }
.remun-total-card { background:var(--navy); color:#fff; border-radius:8px; padding:14px 20px; text-align:center; min-width:130px; }
.remun-total-card .rtval { font-size:22px; font-weight:700; }
.remun-total-card .rtlbl { font-size:11px; opacity:0.75; }
.assess-card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px; }
.assess-score { font-size:28px; font-weight:800; color:var(--navy); }
.agm-item-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.indep-criterion { display:flex; align-items:flex-start; gap:10px; padding:8px 12px; background:#f9f9f9; border:1px solid var(--border); border-radius:6px; margin-bottom:6px; }
.indep-criterion label { flex:1; font-size:13px; cursor:pointer; }
.icheck-pass { background:#E2EFDA; color:#375623; }
.icheck-fail { background:#FCE4D6; color:var(--red); }
.icheck-pending { background:#FFF2CC; color:#996633; }
.training-bar-wrap { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.training-bar-bg { flex:1; height:8px; background:#eee; border-radius:4px; overflow:hidden; }
.training-bar-fill { height:100%; background:var(--blue); border-radius:4px; }
.sync-highlight { background:#FFF9E6; border:1px solid var(--gold); border-radius:8px; padding:12px 16px; margin-bottom:12px; }
</style>
</head>

// ── GitHub Gist API ──────────────────────────────────────────────────────────
function getGistSettings() {
  try { const s = localStorage.getItem(GIST_SETTINGS_KEY); return s ? JSON.parse(s) : { token:'', gistId:'' }; }
  catch(e) { return { token:'', gistId:'' }; }
}
// ลบ base64 ขนาดใหญ่ออกก่อน push Gist (photos/attachments เก็บไว้ใน localStorage เท่านั้น)
function stripBinaryForGist(data) {
  const d = JSON.parse(JSON.stringify(data));
  if (d.directors) d.directors.forEach(dir => { if (dir.photo && dir.photo.startsWith('data:')) dir.photo = '__LOCAL__'; });
  if (d.documents) d.documents.forEach(doc => { if (doc.fileData && doc.fileData.startsWith('data:')) doc.fileData = '__LOCAL__'; });
  if (d.meetings) d.meetings.forEach(m => {
    if (m.agendaAttachments) m.agendaAttachments.forEach(a => { if (a.data) a.data = '__LOCAL__'; });
    if (m.momAttachments) m.momAttachments.forEach(a => { if (a.data) a.data = '__LOCAL__'; });
  });
  return d;
}
// รวม binary กลับจาก localStorage หลัง fetch Gist
function mergeBinaryFromLocal(gistData) {
  try {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (local.directors && gistData.directors) {
      gistData.directors.forEach(gd => {
        if (gd.photo === '__LOCAL__') {
          const ld = local.directors.find(x => x.id === gd.id);
          if (ld) gd.photo = ld.photo || '';
        }
      });
    }
    if (local.documents && gistData.documents) {
      gistData.documents.forEach(gd => {
        if (gd.fileData === '__LOCAL__') {
          const ld = local.documents.find(x => x.id === gd.id);
          if (ld) gd.fileData = ld.fileData || '';
        }
      });
    }
  } catch(e) {}
  return gistData;
}
async function fetchFromGist(token, gistId) {
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`Gist API ${res.status}: ${res.statusText}`);
  const gist = await res.json();
  const file = gist.files['nrc-data.json'];
  if (!file) throw new Error('ไม่พบไฟล์ nrc-data.json ใน Gist');
  let parsed;
  if (file.truncated) {
    const rawRes = await fetch(file.raw_url, { headers: { 'Authorization': `token ${token}` } });
    if (!rawRes.ok) throw new Error(`Raw fetch ${rawRes.status}`);
    parsed = await rawRes.json();
  } else {
    parsed = JSON.parse(file.content);
  }
  return mergeBinaryFromLocal(parsed);
}
async function pushToGist(token, gistId, data) {
  const lean = stripBinaryForGist(data);
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    method: 'PATCH',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
    body: JSON.stringify({ files: { 'nrc-data.json': { content: JSON.stringify(lean) } } })
  });
  if (!res.ok) throw new Error(`Gist save ${res.status}: ${res.statusText}`);
}
async function createNewGist(token, data) {
  const lean = stripBinaryForGist(data);
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
    body: JSON.stringify({
      description: 'NRC Management System Data — PCC',
      public: false,
      files: { 'nrc-data.json': { content: JSON.stringify(lean) } }
    })
  });
  if (!res.ok) throw new Error(`Create Gist ${res.status}: ${res.statusText}`);
  const gist = await res.json();
  return gist.id;
}

}

// ---- Date helpers (dates stored in BE format, e.g. "2569-08-03") ----
function thDate(isoDate) {
  if (!isoDate) return '-';
  const parts = isoDate.split('-');
  if (parts.length < 3) return '-';
  const year = parseInt(parts[0]);
  const month = parseInt(parts[1]) - 1;
  const day = parseInt(parts[2]);
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  // If year > 2500 → already BE; if ≤ 2500 → CE from date picker, add 543
  const displayYear = year > 2500 ? year : year + 543;
  return `${day} ${months[month]} ${displayYear}`;
}
// Convert stored date (BE if >2500) to a CE Date object for comparison
function toDateCE(isoDate) {
  if (!isoDate) return null;
  const parts = isoDate.split('-');
  if (parts.length < 3) return null;
  const year = parseInt(parts[0]);
  const ceYear = year > 2500 ? year - 543 : year;
  return new Date(`${String(ceYear).padStart(4,'0')}-${parts[1]}-${parts[2]}`);
}
// Convert stored BE date → CE string for <input type="date"> value
function toCEStr(isoDate) {
  if (!isoDate) return '';
  const parts = isoDate.split('-');
  if (parts.length < 3) return isoDate;
  const year = parseInt(parts[0]);
  if (year > 2500) return `${year - 543}-${parts[1]}-${parts[2]}`;
  return isoDate;
}
// Convert CE string from date picker → BE string for storage
function toBEStr(ceDate) {
  if (!ceDate) return '';
  const parts = ceDate.split('-');
  if (parts.length < 3) return ceDate;
  const year = parseInt(parts[0]);
  if (year <= 2500) return `${year + 543}-${parts[1]}-${parts[2]}`;
  return ceDate;
}
function statusBadge(status) {
  const map = { completed:['status-completed','สำเร็จแล้ว'], planned:['status-planned','กำหนดการ'], pending:['status-pending','รอดำเนินการ'], overdue:['status-overdue','เกินกำหนด'], inprogress:['status-inprogress','กำลังดำเนินการ'], done:['status-done','เสร็จสิ้น'] };
  const [cls,label] = map[status]||['status-pending',status];
  return `<span class="badge-status ${cls}">${label}</span>`;
}
function priorityTag(p) {
  const m={high:'#C00000',medium:'#ED7D31',low:'#70AD47'}, l={high:'สูง',medium:'กลาง',low:'ต่ำ'};
  return `<span style="color:${m[p]||'#999'};font-weight:700;font-size:11px">${l[p]||p}</span>`;
}
function calcTenureYears(startDate) {
  if (!startDate) return null;
  const start = toDateCE(startDate); if (!start) return null;
  const now = new Date();
  return ((now-start)/(1000*60*60*24*365.25)).toFixed(1);
}

}

// FILE ATTACHMENT UTILITIES
function fileIcon(name) {
  if (!name) return '&#128196;';
  const ext = name.split('.').pop().toLowerCase();
  const icons = { pdf:'&#128196;', docx:'&#128196;', doc:'&#128196;', xlsx:'&#128202;', xls:'&#128202;', pptx:'&#127897;', ppt:'&#127897;', jpg:'&#128444;', jpeg:'&#128444;', png:'&#128444;', zip:'&#128230;' };
  return icons[ext]||'&#128196;';
}
function formatSize(bytes) {
  if (!bytes||bytes===0) return '';
  if (bytes < 1024) return bytes+'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}
function renderAttachList(attachments, onRemove) {
  if (!attachments||!attachments.length) return '<p class="text-muted" style="font-size:12px">ยังไม่มีเอกสารแนบ</p>';
  return attachments.map((att,i)=>`
    <div class="attach-item">
      <span class="attach-icon">${fileIcon(att.name)}</span>
      <div class="attach-name">
        ${att.data ? `<a href="${att.data}" download="${att.name}">${att.name}</a>` : att.name}
        ${att.size ? `<br><span style="color:var(--text-light);font-size:10px">${formatSize(att.size)}</span>` : ''}
      </div>
      ${onRemove ? `<button class="btn-remove" onclick="${onRemove}(${i})">&#10005;</button>` : ''}
    </div>`).join('');
}
function readFileAsBase64(file) {
  return new Promise((resolve,reject)=>{
    if (file.size > 5*1024*1024) { resolve({ name:file.name, size:file.size, data:null, note:'ไฟล์ขนาดใหญ่ (>5MB) บันทึกเฉพาะชื่อ' }); return; }
    const reader = new FileReader();
    reader.onload = e => resolve({ name:file.name, size:file.size, data:e.target.result });
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Upload meeting-level documents (Agenda / MoM)
function uploadMeetingDoc(meetingId, docType) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = '.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.zip';
  input.onchange = async function() {
    const m = DB.meetings.find(x=>x.id===meetingId); if (!m) return;
    const field = docType==='agenda' ? 'agendaAttachments' : 'momAttachments';
    if (!m[field]) m[field] = [];
    for (const file of Array.from(this.files)) {
      const att = await readFileAsBase64(file);
      m[field].push(att);
    }
    saveData();
    viewMeeting(meetingId);
  };
  input.click();
}

// Agenda item attachments
function manageAgendaAttachments(meetingId, agendaId) {
  const m = DB.meetings.find(x=>x.id===meetingId);
  const a = m&&m.agendaItems ? m.agendaItems.find(x=>x.id===agendaId) : null;
  if (!a) return;
  if (!a.attachments) a.attachments = [];

  const renderList = ()=>{
    const listEl = document.getElementById('att-list');
    if (listEl) listEl.innerHTML = renderAttachList(a.attachments, 'removeAgendaAttachment');
  };

  window._currentAttachRef = { meetingId, agendaId };

  openModal(`เอกสารแนบ — ${a.title}`,
    `<div id="att-list">${renderAttachList(a.attachments, 'removeAgendaAttachment')}</div>
    <div class="attach-zone mt-8" onclick="document.getElementById('att-input').click()">
      <input type="file" id="att-input" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png">
      <div style="font-size:24px">&#128206;</div>
      <div style="color:var(--text-light);font-size:13px">คลิกเพื่อเลือกไฟล์แนบ</div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal();viewMeeting('${meetingId}')">ปิด</button>`);

  document.getElementById('att-input').onchange = async function() {
    const ref = window._currentAttachRef;
    const m2 = DB.meetings.find(x=>x.id===ref.meetingId);
    const a2 = m2&&m2.agendaItems ? m2.agendaItems.find(x=>x.id===ref.agendaId) : null;
    if (!a2) return;
    if (!a2.attachments) a2.attachments = [];
    for (const file of Array.from(this.files)) {
      const att = await readFileAsBase64(file);
      a2.attachments.push(att);
    }
    saveData();
    const listEl = document.getElementById('att-list');
    if (listEl) listEl.innerHTML = renderAttachList(a2.attachments, 'removeAgendaAttachment');
  };
}

window.removeAgendaAttachment = function(idx) {
  const ref = window._currentAttachRef; if (!ref) return;
  const m = DB.meetings.find(x=>x.id===ref.meetingId);
  const a = m&&m.agendaItems ? m.agendaItems.find(x=>x.id===ref.agendaId) : null;
  if (!a||!a.attachments) return;
  a.attachments.splice(idx,1);
  saveData();
  const listEl = document.getElementById('att-list');
  if (listEl) listEl.innerHTML = renderAttachList(a.attachments, 'removeAgendaAttachment');
};

function saveMeeting(id, isNew) {
  const no=parseInt(document.getElementById('f-no').value), year=parseInt(document.getElementById('f-year').value);
  const dateCE=document.getElementById('f-date').value, type=document.getElementById('f-type').value;
  const status=document.getElementById('f-status').value, note=document.getElementById('f-note').value;
  if (!no||!dateCE) return alert('กรุณากรอกข้อมูลให้ครบ');
  const date=toBEStr(dateCE); // convert CE picker → BE for storage
  if (isNew) { DB.meetings.push({ id, year, no, date, type, status, agendaItems:[], agendaAttachments:[], momAttachments:[], actionItems:[], momFile:'', agendaFile:'', note }); }
  else { const m=DB.meetings.find(x=>x.id===id); if (m) Object.assign(m,{ no, year, date, type, status, note }); }
  saveData(); closeModal(); renderMeetings();
}

function deleteMeeting(id) {

  DB.meetings = DB.meetings.filter(x=>x.id!==id);

}

  const title=document.getElementById('fai-title').value.trim(); if (!title) return alert('กรุณาระบุรายการ');
  const data = { id, title, owner:document.getElementById('fai-owner').value, dueDate:toBEStr(document.getElementById('fai-due').value), status:document.getElementById('fai-status').value, priority:document.getElementById('fai-priority').value, meetingRef:document.getElementById('fai-meetingRef').value, note:document.getElementById('fai-note').value };
  if (isNew) { DB.actionItems.push(data); }
  else { const ai=DB.actionItems.find(x=>x.id===id); if (ai) Object.assign(ai,data); }
  saveData(); closeModal(); renderMeetings();
}

function toggleAIStatus(id) {
  const ai=DB.actionItems.find(x=>x.id===id); if (!ai) return;
  const cycle=['pending','inprogress','done'];
  ai.status=cycle[(cycle.indexOf(ai.status)+1)%cycle.length];
  saveData();
  const p=document.getElementById('ai-panel'); if (p) p.innerHTML=renderActionItemsTable();
}

function deleteActionItem(id) {
  if (!confirm('ลบ Action Item นี้?')) return;
  DB.actionItems=DB.actionItems.filter(x=>x.id!==id);
  saveData(); closeModal(); renderMeetings();
}

<script>

// DIRECTORS (Board of Directors - full board for CG measurement)
// ============================================================
const SKILLS_LIST = [

function renderDirectors() {

      <td>${d.gender==='female'?'&#9792; หญิง':'&#9794; ชาย'}</td>

        ${d.acRole==='chair'?'<span class="tag">&#11088; AC</span>':d.acRole==='member'?'<span class="tag">AC</span>':''}

        ${d.gcgRole==='chair'?'<span class="tag">&#11088; GCG</span>':d.gcgRole==='member'?'<span class="tag">GCG</span>':''}
        ${d.excoRole==='chair'?'<span class="tag">&#11088; ExCo</span>':d.excoRole==='member'?'<span class="tag">ExCo</span>':''}

    <div class="cards-row">
      <div class="card"><div class="card-label">กรรมการบริษัทรวม</div><div class="card-value">${cg.total}</div><div class="card-sub">คน</div></div>
      <div class="card ${cg.indepRatio>=50?'green':'red'}">

        <div class="card-value">${cg.indepRatio}%</div>
        <div class="card-sub">${cg.independent}/${cg.total} คน ${cg.indepRatio>=50?'&#9989; ผ่านเกณฑ์ &gt;50%':'&#9888; ต่ำกว่าเกณฑ์ 50%'}</div>
      </div>

        <div class="card-label">กรรมการบริหาร (Executive)</div>
        <div class="card-value blue">${DB.directors.filter(d=>d.type==='executive').length}</div>
        <div class="card-sub">${DB.directors.filter(d=>d.type==='executive').length}/${cg.total} คน</div>
      </div>
      <div class="card">
        <div class="card-label">ไม่ใช่บริหาร (Non-Executive)</div>
        <div class="card-value blue">${cg.nonexec}</div>
        <div class="card-sub">${cg.nonexec}/${cg.total} คน</div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-body" style="padding:14px 16px">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px">สัดส่วนกรรมการอิสระ — เกณฑ์ CG: &gt; 50%</div>
            <div class="progress-bar" style="height:12px"><div class="progress-fill" style="width:${Math.min(cg.indepRatio,100)}%;background:${cg.indepRatio>=50?'var(--green)':'var(--red)'}"></div></div>

function buildSkillsMatrix() {
  const dirs = DB.directors;
  if (!dirs.length) return '<p class="text-muted">ยังไม่มีข้อมูลกรรมการ</p>';
  const headers = SKILLS_LIST.map(s=>`<th>${s.label}</th>`).join('');
  const totals = {};
  SKILLS_LIST.forEach(s=>{ totals[s.key]=dirs.filter(d=>d.skills&&d.skills[s.key]).length; });
  const rows = dirs.map(d=>{
    const cells = SKILLS_LIST.map(s=>{
      const has=d.skills&&d.skills[s.key];
      return `<td class="skill-cell ${has?'skill-1':'skill-0'}" onclick="toggleSkill('${d.id}','${s.key}')">${has?'&#9679;':'&#9675;'}</td>`;
    }).join('');
    const fullName = d.name.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'').trim();
    return `<tr><td class="dir-name">${directorAvatar(d.name,24)} ${fullName}</td>${cells}</tr>`;
  }).join('');
  const totalRow = SKILLS_LIST.map(s=>`<td style="font-weight:700;color:var(--navy)">${totals[s.key]}/${dirs.length}</td>`).join('');
  return `<table>
    <thead><tr><th class="dir-name">กรรมการ</th>${headers}</tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td class="dir-name" style="font-weight:700;background:#f0f4fa">รวม</td>${totalRow}</tr></tfoot>
  </table>
  <p class="text-muted mt-8">&#9679; = มีทักษะ &nbsp; &#9675; = ไม่มี &nbsp; คลิกเซลล์เพื่อสลับ</p>`;
}

function toggleSkill(dirId, skillKey) {
  const d=DB.directors.find(x=>x.id===dirId); if (!d) return;
  if (!d.skills) d.skills={};
  d.skills[skillKey]=d.skills[skillKey]?0:1;
  saveData();
  const container=document.getElementById('skills-matrix-container');
  if (container) container.innerHTML=buildSkillsMatrix();
}

function editDirector(id) {
  const d=id?DB.directors.find(x=>x.id===id):null; const isNew=!d;
  const f=d||{ id:genId('d'), name:'', nameEn:'', type:'independent', gender:'male', startDate:'', position:'', nrcRole:'none', acRole:'none', rmcRole:'none', gcgRole:'none', excoRole:'none', skills:{}, note:'' };

      <input type="checkbox" id="fsk-${s.key}" ${f.skills&&f.skills[s.key]?'checked':''}> ${s.label}
    </label>`).join('');
  const roleOpts = (val)=>`<option value="chair" ${val==='chair'?'selected':''}>ประธาน</option><option value="member" ${val==='member'?'selected':''}>กรรมการ</option><option value="none" ${val==='none'?'selected':''}>ไม่มี</option>`;

  const currentPhoto = f.photo || '';
  openModal(isNew?'เพิ่มกรรมการบริษัท':`แก้ไข — ${f.name}`,
    `<div style="display:flex;align-items:flex-start;gap:18px;margin-bottom:14px">
       <div style="flex-shrink:0;text-align:center">
         <div id="photo-preview-wrap">${currentPhoto

         }</div>
         <input type="file" id="fd-photo-file" accept="image/*" style="display:none" onchange="previewPhoto(this)">
         <div style="margin-top:8px;display:flex;gap:6px;justify-content:center">
           <button class="btn btn-sm btn-outline" onclick="document.getElementById('fd-photo-file').click()">&#128247; อัพโหลด</button>
           <button class="btn btn-sm btn-outline" style="color:var(--red)" onclick="removePhoto()">&#10005;</button>
         </div>
       </div>
       <div style="flex:1">
         <div class="form-group"><label>ชื่อ-นามสกุล (ภาษาไทย)</label><input class="form-control" id="fd-name" value="${f.name}"></div>
         <div class="form-group"><label>ชื่อ-นามสกุล (English)</label><input class="form-control" id="fd-nameEn" value="${f.nameEn||''}"></div>
         <div class="form-group"><label>ตำแหน่ง</label><input class="form-control" id="fd-pos" value="${f.position||''}"></div>
       </div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>ประเภทกรรมการ</label><select class="form-control" id="fd-type">
         <option value="independent" ${f.type==='independent'?'selected':''}>อิสระ (Independent)</option>
         <option value="nonexecutive" ${f.type==='nonexecutive'?'selected':''}>ไม่ใช่บริหาร (Non-Executive)</option>
         <option value="executive" ${f.type==='executive'?'selected':''}>บริหาร (Executive)</option>
       </select></div>
       <div class="form-group"><label>เพศ</label><select class="form-control" id="fd-gender">
         <option value="male" ${f.gender==='male'?'selected':''}>ชาย</option>
         <option value="female" ${f.gender==='female'?'selected':''}>หญิง</option>
       </select></div>
     </div>
     <div class="form-group"><label>วันที่เริ่มดำรงตำแหน่ง (ปี ค.ศ. ใช้คำนวณวาระ)</label><input class="form-control" id="fd-start" type="date" value="${toCEStr(f.startDate||'')}"></div>
     <p style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">บทบาทในคณะกรรมการชุดย่อย</p>
     <div class="form-row">
       <div class="form-group"><label>NRC</label><select class="form-control" id="fd-nrc">${roleOpts(f.nrcRole)}</select></div>
       <div class="form-group"><label>AC</label><select class="form-control" id="fd-ac">${roleOpts(f.acRole)}</select></div>
       <div class="form-group"><label>RMC</label><select class="form-control" id="fd-rmc">${roleOpts(f.rmcRole)}</select></div>

     <div class="form-row">
       <div class="form-group"><label>GCG</label><select class="form-control" id="fd-gcg">${roleOpts(f.gcgRole)}</select></div>
       <div class="form-group"><label>ExCo</label><select class="form-control" id="fd-exco">${roleOpts(f.excoRole)}</select></div>

}

function saveDirector(id, isNew) {
  const name=document.getElementById('fd-name').value.trim(); if (!name) return alert('กรุณาระบุชื่อ');
  const skills={};
  SKILLS_LIST.forEach(s=>{ skills[s.key]=document.getElementById('fsk-'+s.key).checked?1:0; });
  const photoEl = document.getElementById('fd-photo-file');
  let photo = (DB.directors.find(x=>x.id===id)||{}).photo || '';
  if (photoEl && photoEl._newPhoto !== undefined) photo = photoEl._newPhoto;
  const data = { id, name, nameEn:document.getElementById('fd-nameEn').value, position:document.getElementById('fd-pos').value, type:document.getElementById('fd-type').value, gender:document.getElementById('fd-gender').value, startDate:toBEStr(document.getElementById('fd-start').value), nrcRole:document.getElementById('fd-nrc').value, acRole:document.getElementById('fd-ac').value, rmcRole:document.getElementById('fd-rmc').value, gcgRole:document.getElementById('fd-gcg').value, excoRole:document.getElementById('fd-exco').value, skills, note:document.getElementById('fd-note').value, training:[], photo };
  if (isNew) { DB.directors.push(data); }
  else { const i=DB.directors.findIndex(x=>x.id===id); if (i>=0) DB.directors[i]=data; }
  saveData(); closeModal(); renderDirectors();
}

function previewPhoto(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (file.size > 2 * 1024 * 1024) { alert('รูปภาพต้องมีขนาดไม่เกิน 2MB'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const src = e.target.result;
    input._newPhoto = src;
    const preview = document.getElementById('photo-preview');
    if (preview) {
      const img = document.createElement('img');
      img.id = 'photo-preview';
      img.src = src;
      img.style.cssText = 'width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border)';
      preview.replaceWith(img);
    }
  };
  reader.readAsDataURL(file);
}
function removePhoto() {
  const input = document.getElementById('fd-photo-file');
  if (input) { input._newPhoto = ''; input.value = ''; }
  const preview = document.getElementById('photo-preview');
  if (preview) {
    const placeholder = document.createElement('span');
    placeholder.id = 'photo-preview';
    placeholder.className = 'dir-avatar-placeholder';
    placeholder.style.cssText = 'width:72px;height:72px;font-size:26px;background:var(--navy)';
    placeholder.textContent = '?';
    preview.replaceWith(placeholder);
  }
}
function deleteDirector(id) {
  if (!confirm('ลบข้อมูลกรรมการนี้?')) return;
  DB.directors=DB.directors.filter(x=>x.id!==id);
  saveData(); closeModal(); renderDirectors();
}

}

function editSCMember(scId, encodedName) {
  const sc=DB.controlList.subcommittees.find(x=>x.id===scId); if (!sc) return;
  const name=decodeURIComponent(encodedName);
  const mem=sc.members ? sc.members.find(m=>m.name===name) : null;
  openModal(`แก้ไข — ${name}`, scMemberForm(mem||{}),
    `<button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
     <button class="btn btn-red" onclick="deleteSCMember('${scId}','${encodedName}')">&#128465; ลบ</button>
     <button class="btn btn-primary" onclick="saveSCMember('${scId}','${encodedName}',false)">บันทึก</button>`);
}

function saveSCMember(scId, encodedOldName, isNew) {
  const sc=DB.controlList.subcommittees.find(x=>x.id===scId); if (!sc) return;
  if (!sc.members) sc.members=[];
  const name=document.getElementById('fsm-name').value.trim(); if (!name) return alert('กรุณาระบุชื่อ');
  const role=document.getElementById('fsm-role').value, type=document.getElementById('fsm-type').value, term=document.getElementById('fsm-term').value;
  if (isNew) { sc.members.push({ name, role, type, term }); }
  else { const oldName=decodeURIComponent(encodedOldName); const m=sc.members.find(x=>x.name===oldName); if (m) Object.assign(m,{ name, role, type, term }); }
  saveData(); closeModal(); renderControlList();
}

function deleteSCMember(scId, encodedName) {
  if (!confirm('ลบสมาชิกนี้?')) return;
  const sc=DB.controlList.subcommittees.find(x=>x.id===scId); if (!sc||!sc.members) return;
  const name=decodeURIComponent(encodedName);
  sc.members=sc.members.filter(m=>m.name!==name);
  saveData(); renderControlList();
}

function addSubDirector(subId) {

function editSubDirector(subId, idx) {

}

function saveSubDirector(subId, idx, isNew) {

  if (!sub.directors) sub.directors=[];
  const name=document.getElementById('fsd-name').value.trim(); if (!name) return alert('กรุณาระบุชื่อ');
  const role=document.getElementById('fsd-role').value, type=document.getElementById('fsd-type').value;
  if (isNew) { sub.directors.push({ name, role, type }); }

  saveData(); closeModal(); renderControlList();
}

function deleteSubDirector(subId, idx) {

  sub.directors.splice(idx,1);

}

const READINESS_MAP = {
  'ready-now':['ready-now','Ready Now (พร้อมทันที)'],
  'ready-1y':['ready-1y','Ready ใน 1 ปี'],
  'ready-2y':['ready-2y','Ready ใน 2-3 ปี'],
  'ready-not':['ready-not','ยังไม่พร้อม']
};

function renderSuccession() {
  const plans = DB.succession;
  const cards = plans.map(sp=>`
    <div class="succession-card">
      <div class="sc-header">
        <h4>&#127919; ${sp.position}</h4>
        <div class="btn-group">
          <button class="btn btn-sm btn-light" onclick="editSuccession('${sp.id}')">&#9998;</button>
          <button class="btn btn-sm btn-light-red" onclick="deleteSuccession('${sp.id}')">&#128465;</button>
        </div>
      </div>
      <div class="sc-body">
        <div class="text-muted" style="font-size:11px;margin-bottom:8px;display:flex;align-items:center;gap:6px">ผู้ดำรงตำแหน่ง: ${directorAvatar(sp.incumbent,22)}<strong>${sp.incumbent}</strong></div>
        ${(sp.successors||[]).map((s,i)=>`
          <div class="sc-successor">
            <div class="label">ผู้สืบทอด #${i+1}</div>
            <div class="flex-between"><div class="name" style="display:flex;align-items:center;gap:7px">${directorAvatar(s.name,22)}<span>${s.name}</span></div>
              <span class="readiness ${s.readiness}">${READINESS_MAP[s.readiness]?READINESS_MAP[s.readiness][1]:s.readiness}</span>
            </div>
            ${s.idp?`<div class="text-muted" style="font-size:11px;margin-top:2px">IDP: ${s.idp}</div>`:''}
          </div>`).join('')}
        ${!sp.successors||!sp.successors.length?'<div class="text-muted">ยังไม่มีผู้สืบทอด</div>':''}
        ${sp.note?`<div class="alert alert-info" style="padding:6px 10px;font-size:12px;margin-top:8px">${sp.note}</div>`:''}
      </div>
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="flex-between mb-8">
      <div class="section-title">&#127919; Succession Plan</div>
      <button class="btn btn-primary" onclick="editSuccession(null)">+ เพิ่มตำแหน่ง</button>
    </div>
    <div class="alert alert-info">
      <span class="readiness ready-now" style="margin-right:6px">Ready Now</span>
      <span class="readiness ready-1y" style="margin-right:6px">Ready 1Y</span>
      <span class="readiness ready-2y" style="margin-right:6px">Ready 2-3Y</span>
      <span class="readiness ready-not">ยังไม่พร้อม</span>
    </div>
    <div class="succession-grid">${cards||'<p class="text-muted">ยังไม่มีข้อมูล</p>'}</div>`;
}

function editSuccession(id) {
  const sp=id?DB.succession.find(x=>x.id===id):null; const isNew=!sp;
  const f=sp||{ id:genId('sp'), position:'', incumbent:'', successors:[], note:'' };
  const succForms=(f.successors||[]).map((s,i)=>buildSuccessorForm(i,s)).join('');
  openModal(isNew?'เพิ่มตำแหน่ง Succession':`แก้ไข — ${f.position}`,
    `<div class="form-row">
       <div class="form-group"><label>ตำแหน่ง</label><input class="form-control" id="fsp-pos" value="${f.position}"></div>
       <div class="form-group"><label>ผู้ดำรงตำแหน่งปัจจุบัน</label><input class="form-control" id="fsp-inc" value="${f.incumbent}"></div>
     </div>
     <div id="successor-forms">${succForms}</div>
     <button class="btn btn-sm btn-outline mt-8" onclick="addSuccessorForm()">+ เพิ่มผู้สืบทอด</button>
     <div class="form-group mt-16"><label>หมายเหตุ</label><textarea class="form-control" id="fsp-note">${f.note||''}</textarea></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
     ${!isNew?`<button class="btn btn-red" onclick="deleteSuccession('${f.id}')">&#128465; ลบ</button>`:''}
     <button class="btn btn-primary" onclick="saveSuccession('${f.id}',${isNew})">บันทึก</button>`);
}

function buildSuccessorForm(i,s) {
  s=s||{};
  return `<div class="successor-form" style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
    <div style="font-weight:700;color:var(--navy);font-size:12px;margin-bottom:6px;display:flex;justify-content:space-between">
      <span>ผู้สืบทอด #${i+1}</span>
      <button type="button" class="btn btn-sm btn-red" style="padding:2px 7px" onclick="this.closest('.successor-form').remove()">&#10005;</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>ชื่อ</label><input class="form-control sf-name" value="${s.name||''}"></div>
      <div class="form-group"><label>ความพร้อม</label><select class="form-control sf-ready">
        ${Object.entries(READINESS_MAP).map(([k,v])=>`<option value="${k}" ${s.readiness===k?'selected':''}>${v[1]}</option>`).join('')}
      </select></div>
    </div>
    <div class="form-group mb-0"><label>IDP</label><input class="form-control sf-idp" value="${s.idp||''}"></div>
  </div>`;
}

function addSuccessorForm() {
  const container=document.getElementById('successor-forms'); if (!container) return;
  const n=container.querySelectorAll('.successor-form').length;
  const div=document.createElement('div'); div.innerHTML=buildSuccessorForm(n,{});
  container.appendChild(div.firstElementChild);
}

function saveSuccession(id,isNew) {
  const position=document.getElementById('fsp-pos').value.trim(); if (!position) return alert('กรุณาระบุตำแหน่ง');
  const incumbent=document.getElementById('fsp-inc').value.trim(), note=document.getElementById('fsp-note').value;
  const successors=[];
  document.querySelectorAll('.successor-form').forEach(form=>{
    const name=form.querySelector('.sf-name').value.trim();
    if (name) successors.push({ name, readiness:form.querySelector('.sf-ready').value, idp:form.querySelector('.sf-idp').value.trim() });
  });
  if (isNew) { DB.succession.push({ id, position, incumbent, successors, note }); }
  else { const sp=DB.succession.find(x=>x.id===id); if (sp) Object.assign(sp,{ position, incumbent, successors, note }); }
  saveData(); closeModal(); renderSuccession();
}

function deleteSuccession(id) {
  if (!confirm('ลบตำแหน่งนี้?')) return;
  DB.succession=DB.succession.filter(x=>x.id!==id);
  saveData(); closeModal(); renderSuccession();
}

// DIRECTOR CHANGELOG
// ============================================================
const CL_TYPES = {
  appointed: { label:'แต่งตั้ง', cls:'cltype-appointed' },
  resigned:  { label:'พ้นตำแหน่ง / ลาออก', cls:'cltype-resigned' },
  role_change: { label:'เปลี่ยนบทบาท', cls:'cltype-role_change' },
  committee_change: { label:'เปลี่ยนคณะย่อย', cls:'cltype-committee_change' },
  position_change: { label:'เปลี่ยนตำแหน่ง', cls:'cltype-position_change' },
  other: { label:'อื่นๆ', cls:'cltype-other' }
};

function renderChangelog() {
  const logs = [...(DB.directorChangelog||[])].sort((a,b) => {
    const da = toDateCE(a.effectiveDate)||new Date(0);
    const db2 = toDateCE(b.effectiveDate)||new Date(0);
    return db2 - da; // newest first
  });
  const filterDir = document.getElementById('cl-filter-dir') ? document.getElementById('cl-filter-dir').value : '';
  const filterType = document.getElementById('cl-filter-type') ? document.getElementById('cl-filter-type').value : '';

  const dirOptions = DB.directors.map(d => `<option value="${d.id}">${d.name.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'')}</option>`).join('');
  const typeOptions = Object.entries(CL_TYPES).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('');

  const filtered = logs.filter(l => {
    if (filterDir && l.directorId !== filterDir) return false;
    if (filterType && l.changeType !== filterType) return false;
    return true;
  });

  let timelineHtml = '';
  if (filtered.length === 0) {
    timelineHtml = `<div class="text-muted" style="text-align:center;padding:40px 0">ยังไม่มีรายการ — กด "+ บันทึกการเปลี่ยนแปลง" เพื่อเริ่มต้น</div>`;
  } else {
    filtered.forEach(l => {
      const t = CL_TYPES[l.changeType] || CL_TYPES.other;
      const refs = [];
      if (l.nrcMeetingRef) refs.push(`<span class="cl-ref-tag nrc">📋 NRC: ${l.nrcMeetingRef}</span>`);
      if (l.boardMeetingRef) refs.push(`<span class="cl-ref-tag board">🏛 Board: ${l.boardMeetingRef}</span>`);
      if (l.agmRef) refs.push(`<span class="cl-ref-tag agm">🗳 AGM: ${l.agmRef}</span>`);
      const approvedMap = { nrc:'อนุมัติโดย NRC', board:'อนุมัติโดย Board', agm:'อนุมัติโดย AGM', other:'' };
      const prevNew = (l.previousValue||l.newValue) ? `
        <div style="font-size:12px;color:var(--text-light);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap">
          ${l.previousValue ? `<span>เดิม: <strong>${l.previousValue}</strong></span>` : ''}
          ${l.newValue ? `<span style="color:var(--green)">ใหม่: <strong>${l.newValue}</strong></span>` : ''}
        </div>` : '';
      timelineHtml += `
      <div class="cl-entry type-${l.changeType}">
        <div class="cl-header">
          <div>
            <span class="cl-type-badge ${t.cls}">${t.label}</span>
            <div class="cl-title" style="display:flex;align-items:center;gap:8px">${directorAvatar(l.directorName,30)}<span>${l.directorName||'—'}</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span class="cl-date">${thDate(l.effectiveDate)}</span>
            <div class="cl-actions">
              <button class="btn btn-outline btn-sm" onclick="editChangelogEntry('${l.id}')">✏️</button>
              <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteChangelogEntry('${l.id}')">🗑</button>
            </div>
          </div>
        </div>
        <div class="cl-detail">${l.changeDetail||'—'}</div>
        ${prevNew}
        ${refs.length ? `<div class="cl-refs">${refs.join('')}${approvedMap[l.approvedBy]?`<span class="cl-ref-tag">${approvedMap[l.approvedBy]}</span>`:''}</div>` : ''}
        ${l.note ? `<div style="margin-top:6px;font-size:12px;color:var(--text-light);font-style:italic">หมายเหตุ: ${l.note}</div>` : ''}
        <div style="margin-top:6px;font-size:10px;color:var(--text-light)">บันทึกโดย: ${l.recordedBy||'-'} เมื่อ ${thDate(l.recordedDate)}</div>
      </div>`;
    });
  }

  document.getElementById('content').innerHTML = `
    <div class="section-title">📋 ประวัติการเปลี่ยนแปลงกรรมการ</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
      <select id="cl-filter-dir" class="form-control" style="width:200px" onchange="renderChangelog()">
        <option value="">— กรองตามกรรมการ —</option>
        ${dirOptions}
      </select>
      <select id="cl-filter-type" class="form-control" style="width:180px" onchange="renderChangelog()">
        <option value="">— กรองตามประเภท —</option>
        ${typeOptions}
      </select>
      <button class="btn btn-green" onclick="openChangelogModal(null)">+ บันทึกการเปลี่ยนแปลง</button>
      <span style="margin-left:auto;font-size:12px;color:var(--text-light)">${filtered.length} รายการ</span>
    </div>
    <div class="alert alert-info" style="margin-bottom:16px;font-size:12px">
      <strong>วิธีใช้:</strong> บันทึกทุกครั้งที่มีการแต่งตั้ง / พ้นตำแหน่ง / เปลี่ยนบทบาทกรรมการ พร้อมระบุการประชุม NRC / Board / AGM ที่อ้างอิง
    </div>
    <div class="changelog-timeline">${timelineHtml}</div>`;

  // restore filter values after re-render
  if (filterDir) document.getElementById('cl-filter-dir').value = filterDir;
  if (filterType) document.getElementById('cl-filter-type').value = filterType;
}

function openChangelogModal(id) {
  const l = id ? DB.directorChangelog.find(x=>x.id===id) : null;

  const dirOptions = DB.directors.map(d => {
    const sel = l && l.directorId === d.id ? 'selected' : '';
    return `<option value="${d.id}" ${sel}>${d.name}</option>`;

  const typeOptions = Object.entries(CL_TYPES).map(([k,v]) => {
    const sel = l && l.changeType === k ? 'selected' : '';

      </div>
    </div>
    <div class="form-group">
      <label>ชื่อกรรมการ (กรอกเองถ้าไม่อยู่ในรายการ)</label>
      <input class="form-control" id="cl-dirname" value="${l?l.directorName:''}" placeholder="ชื่อ-นามสกุลกรรมการ">
    </div>
    <div class="form-group">
      <label>วันที่มีผลบังคับ *</label>
      <input type="date" class="form-control" id="cl-date" value="${l?toCEStr(l.effectiveDate):''}">
    </div>
    <div class="form-group">
      <label>รายละเอียดการเปลี่ยนแปลง *</label>
      <textarea class="form-control" id="cl-detail" rows="2" placeholder="เช่น: แต่งตั้งเป็นประธานคณะกรรมการ NRC แทน นาย ก.">${l?l.changeDetail:''}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>ตำแหน่ง/บทบาทเดิม</label>
        <input class="form-control" id="cl-prev" value="${l?l.previousValue:''}" placeholder="บทบาทก่อนเปลี่ยน">
      </div>
      <div class="form-group">
        <label>ตำแหน่ง/บทบาทใหม่</label>
        <input class="form-control" id="cl-new" value="${l?l.newValue:''}" placeholder="บทบาทหลังเปลี่ยน">
      </div>
    </div>
    <hr class="divider">
    <div style="font-weight:600;color:var(--navy);margin-bottom:10px;font-size:13px">📎 อ้างอิงการประชุม</div>
    <div class="form-row">
      <div class="form-group">
        <label>การประชุม NRC</label>
        <select class="form-control" id="cl-nrc-sel" onchange="clSyncNrcRef()">
          <option value="">— เลือกการประชุม NRC —</option>
          ${meetingOptions}

function saveChangelogEntry(id) {
  const dirId = document.getElementById('cl-dir').value;
  const dirName = document.getElementById('cl-dirname').value.trim();
  const detail = document.getElementById('cl-detail').value.trim();
  const dateVal = document.getElementById('cl-date').value;
  if (!dirName) { alert('กรุณาระบุชื่อกรรมการ'); return; }
  if (!detail) { alert('กรุณาระบุรายละเอียดการเปลี่ยนแปลง'); return; }
  if (!dateVal) { alert('กรุณาระบุวันที่มีผลบังคับ'); return; }

  const today = new Date();
  const todayBE = `${today.getFullYear()+543}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const entry = {
    id: id || genId('dcl'),
    effectiveDate: toBEStr(dateVal),
    directorId: dirId,
    directorName: dirName,
    changeType: document.getElementById('cl-type').value,
    changeDetail: detail,
    previousValue: document.getElementById('cl-prev').value.trim(),
    newValue: document.getElementById('cl-new').value.trim(),
    nrcMeetingRef: document.getElementById('cl-nrc').value.trim(),
    boardMeetingRef: document.getElementById('cl-board').value.trim(),
    agmRef: document.getElementById('cl-agm').value.trim(),
    approvedBy: document.getElementById('cl-approvedby').value,
    note: document.getElementById('cl-note').value.trim(),
    recordedDate: todayBE,
    recordedBy: document.getElementById('cl-recby').value.trim()
  };
  if (id) {
    const idx = DB.directorChangelog.findIndex(x=>x.id===id);
    if (idx >= 0) DB.directorChangelog[idx] = entry;
  } else {
    DB.directorChangelog.push(entry);
  }
  saveData();
  closeModal();
  renderChangelog();
  // Offer committee sync if change affects membership
  if (['appointed','resigned','committee_change','role_change','position_change'].includes(entry.changeType)) {
    setTimeout(()=>{
      if (confirm('ต้องการอัพเดทรายชื่อกรรมการในคณะย่อยด้วยหรือไม่?\n(เพื่อให้ตรงกับการเปลี่ยนแปลงที่บันทึกไว้)')) {
        openCommitteeSyncModal(entry.directorName, CL_TYPES[entry.changeType]?.label||entry.changeType);
      }
    }, 100);
  }
}

function editChangelogEntry(id) { openChangelogModal(id); }
function deleteChangelogEntry(id) {
  if (!confirm('ลบรายการนี้?')) return;
  DB.directorChangelog = DB.directorChangelog.filter(x=>x.id!==id);
  saveData();
  renderChangelog();
}

function saveBulkRemun(year) {
  document.querySelectorAll('#modal-body input[data-did]').forEach(inp=>{

    r[field] = val;

}

function saveRemun(dirId, year) {

function renderTraining() {
  const filterDir = document.getElementById('tr-fdir')?.value || '';
  const filterCat = document.getElementById('tr-fcat')?.value || '';
  const filterYr  = document.getElementById('tr-fyr')?.value  || '';
  const dirOpts = DB.directors.map(d=>`<option value="${d.id}" ${d.id===filterDir?'selected':''}>${d.name.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'')}</option>`).join('');
  const catOpts = Object.entries(TRAIN_CATS).map(([k,v])=>`<option value="${k}" ${k===filterCat?'selected':''}>${v}</option>`).join('');
  const allYrs = [...new Set(DB.directorTraining.map(t=>t.date?.substr(0,4)).filter(Boolean))].sort().reverse();
  const yrOpts = allYrs.map(y=>`<option value="${y}" ${y===filterYr?'selected':''}>${y}</option>`).join('');

  let rows = DB.directorTraining;
  if (filterDir) rows = rows.filter(r=>r.directorId===filterDir);
  if (filterCat) rows = rows.filter(r=>r.category===filterCat);
  if (filterYr)  rows = rows.filter(r=>r.date?.startsWith(filterYr));
  rows = [...rows].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  // Summary: hours per director
  const hrMap = {};
  DB.directorTraining.forEach(t=>{ hrMap[t.directorId]=(hrMap[t.directorId]||0)+(t.hours||0); });
  const summaryBars = DB.directors.map(d=>{
    const hrs = hrMap[d.id]||0;

    const pct = Math.min(hrs/24*100,100);
    const color = hrs>=24?'var(--green)':hrs>=12?'var(--blue)':'var(--orange)';
    return `<div class="training-bar-wrap">${directorAvatar(d.name,26)}<span style="font-size:11px;min-width:80px">${sn}</span><div class="training-bar-bg"><div class="training-bar-fill" style="width:${pct}%;background:${color}"></div></div><span style="font-size:11px;min-width:50px;text-align:right">${hrs} ชม.</span></div>`;
  }).join('');

  const tRows = rows.map(t=>{
    const d = DB.directors.find(x=>x.id===t.directorId);
    const sn = d ? d.name.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'') : t.directorName;
    return `<tr>
      <td><div class="dir-avatar-wrap" style="gap:8px">${directorAvatar(d?d.name:sn,28)}<span>${sn}</span></div></td>
      <td><strong>${t.course||'-'}</strong></td>
      <td>${t.organizer||'-'}</td>
      <td>${thDate(t.date)}</td>
      <td class="text-right">${t.hours||0}</td>
      <td><span class="badge-status status-inprogress">${TRAIN_CATS[t.category]||t.category}</span></td>

        <button class="btn btn-sm btn-orange" onclick="editTraining('${t.id}')">✏️</button>
        <button class="btn btn-sm btn-red" onclick="deleteTraining('${t.id}')">🗑</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="flex-between mb-8">
      <div class="section-title">📚 แผนพัฒนากรรมการ (Director Training)</div>

      <select id="tr-fcat" class="form-control" style="width:160px" onchange="renderTraining()"><option value="">— หมวดทั้งหมด —</option>${catOpts}</select>
      <select id="tr-fyr"  class="form-control" style="width:110px" onchange="renderTraining()"><option value="">— ปีทั้งหมด —</option>${yrOpts}</select>

// SELF-ASSESSMENT — ประเมินผลกรรมการ
// ============================================================
const ASSESS_COMMITTEES = { board:'คณะกรรมการบริษัท', nrc:'NRC', ac:'AC', rmc:'RMC', gcg:'GCG' };
const ASSESS_ASPECTS = [
  'โครงสร้างและองค์ประกอบของคณะกรรมการ',
  'บทบาท หน้าที่ และความรับผิดชอบ',
  'การประชุมคณะกรรมการ',
  'การปฏิบัติหน้าที่ของกรรมการ',
  'ความสัมพันธ์กับฝ่ายจัดการ',
  'การพัฒนาตนเองของกรรมการและการพัฒนาองค์กร'
];

function renderAssessment() {
  const filter = document.getElementById('as-fcom')?.value || '';
  const comOpts = Object.entries(ASSESS_COMMITTEES).map(([k,v])=>`<option value="${k}" ${k===filter?'selected':''}>${v}</option>`).join('');
  let list = DB.selfAssessments;
  if (filter) list = list.filter(x=>x.committee===filter);
  list = [...list].sort((a,b)=>(b.year||0)-(a.year||0));

  const cards = list.map(a=>{
    const pct = a.maxScore ? Math.round(a.totalScore/a.maxScore*100) : 0;
    const col = pct>=80?'var(--green)':pct>=60?'var(--blue)':'var(--orange)';
    const comLabel = ASSESS_COMMITTEES[a.committee]||a.committee;
    return `<div class="assess-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><span class="badge-status status-inprogress" style="margin-bottom:6px">${comLabel}</span>
          <div class="section-title" style="font-size:15px;margin:0">ปี ${a.year}</div>
          <div class="text-muted">${thDate(a.assessDate)}</div>
        </div>
        <div style="text-align:center">
          <div class="assess-score" style="color:${col}">${pct}%</div>
          <div class="text-muted">${a.totalScore}/${a.maxScore}</div>
        </div>
      </div>
      ${a.note?`<div style="margin-top:8px;font-size:12px;color:var(--text-light);font-style:italic">${a.note}</div>`:''}
      <div style="margin-top:10px;display:flex;gap:6px">
        <button class="btn btn-sm btn-orange" onclick="editAssessment('${a.id}')">✏️ แก้ไข</button>
        <button class="btn btn-sm btn-red" onclick="deleteAssessment('${a.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="flex-between mb-8">
      <div class="section-title">📊 ประเมินผลกรรมการ (Self-Assessment)</div>
      <button class="btn btn-primary" onclick="editAssessment(null)">+ บันทึกผลประเมิน</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <select id="as-fcom" class="form-control" style="width:200px" onchange="renderAssessment()">
        <option value="">— คณะกรรมการทั้งหมด —</option>${comOpts}
      </select>
    </div>
    <div class="alert alert-info" style="font-size:12px;margin-bottom:14px">📋 การประเมินตนเองของคณะกรรมการต้องดำเนินการอย่างน้อยปีละครั้ง และนำเสนอผลต่อที่ประชุมคณะกรรมการ</div>
    ${list.length===0?'<p class="text-muted" style="text-align:center;padding:30px">ยังไม่มีผลการประเมิน</p>':`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">${cards}</div>`}`;
}

function editAssessment(id) {
  const a = id ? DB.selfAssessments.find(x=>x.id===id) : null;
  const comOpts = Object.entries(ASSESS_COMMITTEES).map(([k,v])=>`<option value="${k}" ${a&&a.committee===k?'selected':''}>${v}</option>`).join('');
  const aspectRows = ASSESS_ASPECTS.map((asp,i)=>{
    const score = a&&a.scores ? (a.scores[i]||0) : 0;
    return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="flex:1;font-size:12px">${i+1}. ${asp}</span>
      <input type="number" min="0" max="5" class="form-control" style="width:70px;font-size:13px" id="as-s${i}" value="${score}" placeholder="0-5">

  }).join('');
  document.getElementById('modal-title').textContent = id?'✏️ แก้ไขผลประเมิน':'+ บันทึกผลประเมิน';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label>คณะกรรมการ *</label><select class="form-control" id="as-com">${comOpts}</select></div>
      <div class="form-group"><label>ปี พ.ศ. *</label><input type="number" class="form-control" id="as-year" value="${a?a.year:DB.company.fiscalYear}"></div>
      <div class="form-group"><label>วันที่ประเมิน</label><input type="date" class="form-control" id="as-date" value="${a?toCEStr(a.assessDate):''}"></div>
    </div>
    <div style="font-weight:600;color:var(--navy);margin:10px 0 6px;font-size:13px">คะแนนรายด้าน (0=ต่ำสุด, 5=สูงสุด)</div>
    ${aspectRows}
    <div class="form-row" style="margin-top:10px">
      <div class="form-group"><label>คะแนนรวมทั้งหมด</label><input type="number" class="form-control" id="as-total" value="${a?a.totalScore:0}" placeholder="คะแนนที่ได้"></div>
      <div class="form-group"><label>คะแนนเต็ม</label><input type="number" class="form-control" id="as-max" value="${a?a.maxScore:30}"></div>
    </div>
    <div class="form-group"><label>สรุปผล / ข้อสังเกต</label><textarea class="form-control" id="as-note" rows="2">${a?a.note:''}</textarea></div>`;
  document.getElementById('modal-footer').innerHTML = `<button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="saveAssessment('${id||''}')">💾 บันทึก</button>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function saveAssessment(id) {
  const year = parseInt(document.getElementById('as-year').value);
  const committee = document.getElementById('as-com').value;
  const dateVal = document.getElementById('as-date').value;
  const scores = ASSESS_ASPECTS.map((_,i)=>parseInt(document.getElementById('as-s'+i).value)||0);
  const autoTotal = scores.reduce((a,b)=>a+b,0);
  const manualTotal = parseInt(document.getElementById('as-total').value)||autoTotal;
  if (!year || !committee) { alert('กรุณากรอกข้อมูลให้ครบ'); return; }
  const entry = {
    id: id||genId('as'), year, committee,
    assessDate: dateVal?toBEStr(dateVal):'',
    scores, totalScore:manualTotal,
    maxScore:parseInt(document.getElementById('as-max').value)||30,
    note:document.getElementById('as-note').value
  };
  if (id) { const i=DB.selfAssessments.findIndex(x=>x.id===id); if(i>=0) DB.selfAssessments[i]=entry; }
  else DB.selfAssessments.push(entry);
  saveData(); closeModal(); renderAssessment();
}

function deleteAssessment(id) {
  if (!confirm('ลบรายการนี้?')) return;
  DB.selfAssessments = DB.selfAssessments.filter(x=>x.id!==id);
  saveData(); renderAssessment();
}

const DOC_TYPES = { charter:'กฏบัตร', policy:'นโยบาย', procedure:'ระเบียบปฏิบัติ', form:'แบบฟอร์ม', report:'รายงาน', other:'อื่นๆ' };

function renderDocuments() {
  const filter = document.getElementById('doc-ftype')?.value || '';
  const typeOpts = Object.entries(DOC_TYPES).map(([k,v])=>`<option value="${k}" ${k===filter?'selected':''}>${v}</option>`).join('');

  if (filter) docs = docs.filter(d=>d.docType===filter);

  const cards = docs.map(doc=>{
    const typeCls = `doc-type-${doc.docType==='charter'?'charter':doc.docType==='policy'?'policy':doc.docType==='procedure'?'procedure':doc.docType==='form'?'form':'other'}`;

      ${doc.file&&doc.file.data?`<div style="margin-top:8px"><a href="${doc.file.data}" download="${doc.file.name}" class="btn btn-sm btn-outline">⬇ ${doc.file.name}</a></div>`:''}
      ${doc.file&&!doc.file.data?`<div style="margin-top:8px;font-size:11px;color:var(--text-light)">📎 ${doc.file.name}</div>`:''}
      <div style="margin-top:10px;display:flex;gap:6px">
        <button class="btn btn-sm btn-orange" onclick="editDocument('${doc.id}')">✏️</button>
        <button class="btn btn-sm btn-red" onclick="deleteDocument('${doc.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="flex-between mb-8">

    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <select id="doc-ftype" class="form-control" style="width:180px" onchange="renderDocuments()">
        <option value="">— ประเภทเอกสารทั้งหมด —</option>${typeOpts}
      </select>
      <span style="margin-left:auto;font-size:12px;color:var(--text-light)">${docs.length} เอกสาร</span>
    </div>
    ${docs.length===0?'<p class="text-muted" style="text-align:center;padding:30px">ยังไม่มีเอกสาร — กด "+ เพิ่มเอกสาร" เพื่อเริ่มต้น</p>':`<div class="doc-grid">${cards}</div>`}`;
}

function editDocument(id) {
  const doc = id ? DB.documents.find(x=>x.id===id) : null;
  const typeOpts = Object.entries(DOC_TYPES).map(([k,v])=>`<option value="${k}" ${doc&&doc.docType===k?'selected':''}>${v}</option>`).join('');
  document.getElementById('modal-title').textContent = id?'✏️ แก้ไขเอกสาร':'+ เพิ่มเอกสาร';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>ชื่อเอกสาร *</label><input class="form-control" id="doc-title" value="${doc?doc.title:''}" placeholder="เช่น กฏบัตรคณะกรรมการสรรหาฯ"></div>
    <div class="form-row">
      <div class="form-group"><label>ประเภท</label><select class="form-control" id="doc-type">${typeOpts}</select></div>
      <div class="form-group"><label>Version</label><input class="form-control" id="doc-ver" value="${doc?doc.version:''}" placeholder="เช่น 2.0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>วันที่มีผลบังคับ</label><input type="date" class="form-control" id="doc-eff" value="${doc?toCEStr(doc.effectiveDate):''}"></div>
      <div class="form-group"><label>อนุมัติโดย</label><input class="form-control" id="doc-apby" value="${doc?doc.approvedBy:''}" placeholder="เช่น Board 2/2569"></div>
    </div>
    <div class="form-group"><label>แนบไฟล์ (ไม่เกิน 5MB)</label><input type="file" id="doc-file" class="form-control" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx">${doc&&doc.file?`<div style="font-size:11px;margin-top:4px;color:var(--text-light)">ไฟล์ปัจจุบัน: ${doc.file.name}</div>`:''}</div>
    <div class="form-group"><label>หมายเหตุ</label><textarea class="form-control" id="doc-note" rows="2">${doc?doc.note:''}</textarea></div>`;
  document.getElementById('modal-footer').innerHTML = `<button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="saveDocument('${id||''}')">💾 บันทึก</button>`;
  document.getElementById('modal-overlay').classList.add('show');

async function saveDocument(id) {
  const title = document.getElementById('doc-title').value.trim();
  if (!title) { alert('กรุณาระบุชื่อเอกสาร'); return; }
  const fileInput = document.getElementById('doc-file');
  let fileData = id ? (DB.documents.find(x=>x.id===id)||{}).file : null;
  if (fileInput.files.length > 0) {
    fileData = await readFileAsBase64(fileInput.files[0]);
  }
  const entry = {
    id:id||genId('doc'), title,
    docType:document.getElementById('doc-type').value,
    version:document.getElementById('doc-ver').value,
    effectiveDate:toBEStr(document.getElementById('doc-eff').value),
    approvedBy:document.getElementById('doc-apby').value,
    file:fileData, note:document.getElementById('doc-note').value
  };
  if (id) { const i=DB.documents.findIndex(x=>x.id===id); if(i>=0) DB.documents[i]=entry; }
  else DB.documents.push(entry);
  saveData(); closeModal(); renderDocuments();
}

function deleteDocument(id) {
  if (!confirm('ลบเอกสารนี้?')) return;
  DB.documents = DB.documents.filter(x=>x.id!==id);
  saveData(); renderDocuments();
}

const AGM_TEMPLATE = [
  { title:'ปิดสมุดทะเบียนผู้ถือหุ้น', responsible:'บริษัทฯ (ฝ่ายเลขานุการ)' },
  { title:'ประกาศนัดประชุม AGM ใน SET Portal', responsible:'เลขานุการบริษัท' },
  { title:'จัดส่งหนังสือเชิญประชุม AGM พร้อม Proxy Form', responsible:'เลขานุการบริษัท' },
  { title:'NRC: เสนอชื่อกรรมการออกตามวาระ', responsible:'เลขา NRC' },
  { title:'NRC: พิจารณาค่าตอบแทนกรรมการ เสนอ AGM', responsible:'เลขา NRC' },
  { title:'จัดทำรายงานประจำปี / 56-1 One Report', responsible:'ฝ่ายนักลงทุนสัมพันธ์' },
  { title:'วันประชุมสามัญผู้ถือหุ้น (AGM)', responsible:'เลขานุการบริษัท' },
  { title:'จดรายงานการประชุม AGM และแจ้ง SET', responsible:'เลขานุการบริษัท' }
];

function renderAGM() {
  const years = [...new Set(DB.agmItems.map(a=>a.year).concat([DB.company.fiscalYear]))].sort().reverse();
  const selYear = parseInt(document.getElementById('agm-yr-sel')?.value||years[0]);
  const yrOpts = years.map(y=>`<option value="${y}" ${y===selYear?'selected':''}>${y}</option>`).join('');
  const items = DB.agmItems.filter(a=>a.year===selYear).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
  const today = new Date();
  const done = items.filter(i=>i.status==='done').length;

  const rows = items.map(item=>{
    const due = toDateCE(item.dueDate);
    const isOverdue = due && due < today && item.status !== 'done';
    const rowBg = item.status==='done'?'background:#f0fdf4':'';
    const sts = item.status==='done'?'<span class="badge-status status-completed">✅ เสร็จแล้ว</span>':isOverdue?'<span class="badge-status status-overdue">⚠️ เกินกำหนด</span>':'<span class="badge-status status-planned">⏳ รอดำเนินการ</span>';
    return `<div class="agm-item-row" style="${rowBg}">
      <input type="checkbox" ${item.status==='done'?'checked':''} onchange="toggleAGMItem('${item.id}',this.checked)" style="width:16px;height:16px">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--navy)">${item.title}</div>
        <div style="font-size:11px;color:var(--text-light)">${item.responsible} | กำหนด: ${thDate(item.dueDate)}</div>
        ${item.note?`<div style="font-size:11px;font-style:italic;color:var(--text-light)">${item.note}</div>`:''}
      </div>
      ${sts}
      <div style="display:flex;gap:4px">
        <button class="btn btn-sm btn-orange" onclick="editAGMItem('${item.id}',${selYear})">✏️</button>
        <button class="btn btn-sm btn-red" onclick="deleteAGMItem('${item.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  const pct = items.length ? Math.round(done/items.length*100) : 0;
  document.getElementById('content').innerHTML = `
    <div class="flex-between mb-8">
      <div class="section-title">🗳 AGM Tracker</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="agm-yr-sel" class="form-control" style="width:100px" onchange="renderAGM()">${yrOpts}</select>
        <button class="btn btn-outline btn-sm" onclick="initAGMYear(${selYear})">🔧 สร้างรายการ AGM ${selYear}</button>
        <button class="btn btn-primary btn-sm" onclick="editAGMItem(null,${selYear})">+ เพิ่มรายการ</button>
      </div>
    </div>
    <div style="display:flex;gap:14px;margin-bottom:16px;align-items:center">
      <div class="remun-total-card" style="background:var(--blue)"><div class="rtval">${items.length}</div><div class="rtlbl">รายการทั้งหมด</div></div>
      <div class="remun-total-card" style="background:var(--green)"><div class="rtval">${done}</div><div class="rtlbl">เสร็จแล้ว</div></div>
      <div class="remun-total-card" style="background:${pct===100?'var(--green)':'var(--orange)'}"><div class="rtval">${pct}%</div><div class="rtlbl">ความคืบหน้า</div></div>
    </div>
    ${items.length===0?`<div class="alert alert-info">กด "สร้างรายการ AGM ${selYear}" เพื่อสร้าง Checklist มาตรฐาน หรือกด "+ เพิ่มรายการ" เพื่อเพิ่มเอง</div>`:
    `<div class="panel"><div class="panel-body">${rows}</div></div>`}`;
}

function initAGMYear(year) {
  if (!confirm(`สร้าง Checklist AGM ปี ${year} (${AGM_TEMPLATE.length} รายการ)?`)) return;
  const existing = DB.agmItems.filter(a=>a.year===year);
  if (existing.length > 0 && !confirm('มีรายการของปีนี้อยู่แล้ว ต้องการเพิ่มเติมหรือไม่?')) return;
  AGM_TEMPLATE.forEach(t=>{
    DB.agmItems.push({ id:genId('agm'), year, title:t.title, dueDate:'', status:'pending', responsible:t.responsible, note:'' });
  });
  saveData(); renderAGM();
}

function toggleAGMItem(id, checked) {
  const item = DB.agmItems.find(x=>x.id===id);
  if (item) { item.status = checked?'done':'pending'; saveData(); }
}

function editAGMItem(id, year) {
  const item = id ? DB.agmItems.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = id?'✏️ แก้ไขรายการ AGM':'+ เพิ่มรายการ AGM';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>รายการ *</label><input class="form-control" id="agm-title" value="${item?item.title:''}" placeholder="รายละเอียดรายการ"></div>
    <div class="form-row">
      <div class="form-group"><label>กำหนดเสร็จ</label><input type="date" class="form-control" id="agm-due" value="${item?toCEStr(item.dueDate):''}"></div>
      <div class="form-group"><label>ผู้รับผิดชอบ</label><input class="form-control" id="agm-resp" value="${item?item.responsible:''}" placeholder="ชื่อหรือตำแหน่ง"></div>
    </div>
    <div class="form-group"><label>สถานะ</label>
      <select class="form-control" id="agm-status">
        <option value="pending" ${!item||item.status==='pending'?'selected':''}>⏳ รอดำเนินการ</option>
        <option value="done" ${item&&item.status==='done'?'selected':''}>✅ เสร็จแล้ว</option>
      </select>

function saveAGMItem(id, year) {

function renderConflict() {
  const filterDir = document.getElementById('coi-fdir')?.value || '';
  const filterMtg = document.getElementById('coi-fmtg')?.value || '';
  const dirOpts = DB.directors.map(d=>`<option value="${d.id}" ${d.id===filterDir?'selected':''}>${d.name.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'')}</option>`).join('');
  const mtgOpts = DB.meetings.map(m=>`<option value="${m.id}" ${m.id===filterMtg?'selected':''}>${'NRC '+m.no+'/'+m.year}</option>`).join('');

  let rows = DB.conflictLog;
  if (filterDir) rows = rows.filter(r=>r.directorId===filterDir);
  if (filterMtg) rows = rows.filter(r=>r.meetingId===filterMtg);
  rows = [...rows].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const tRows = rows.map(c=>{
    const d = DB.directors.find(x=>x.id===c.directorId);
    const sn = d ? d.name.replace(/^(รศ\.ดร\.ภก\.|รศ\.ดร\.|ดร\.|นางสาว|นาง|นาย)\s*/,'') : c.directorName;

      <td>${thDate(c.date)}</td>

      <td style="text-align:center">${c.abstained?'<span class="badge-status status-completed">✅ งด</span>':'<span class="badge-status status-planned">ไม่งด</span>'}</td>
      <td style="font-size:11px">${c.note||''}</td>
      <td>
        <button class="btn btn-sm btn-orange" onclick="editConflict('${c.id}')">✏️</button>

      <button class="btn btn-primary" onclick="editConflict(null)">+ บันทึก COI</button>
    </div>
